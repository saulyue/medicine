services:
  backend:
    image: node:20-alpine
    container_name: medicine-backend
    working_dir: /app
    ports:
      - "3001:3001"
    volumes:
      - ./backend/.next:/app/.next:ro
      - ./backend/node_modules:/app/node_modules:ro
      - ./backend/package.json:/app/package.json:ro
    command: npm start
    environment:
      - NODE_ENV=production
      - DB_HOST=sh-cynosdbmysql-grp-hkebiel2.sql.tencentcdb.com
      - DB_PORT=21397
      - DB_USER=root
      - DB_PASS=${DB_PASS}
      - DB_NAME=medicine
    mem_limit: 384m
    restart: unless-stopped
