name: Deploy Frontend

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        working-directory: ./frontend
        env:
          HUSKY: "0"
          CI: "false"
        run: |
          pnpm install --no-frozen-lockfile --ignore-scripts
          pnpm build

      # ── 上传 dist 到 COS ──
      - name: Install coscmd
        run: pip install coscmd

      - name: Upload to COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
        run: |
          coscmd config \
            -a "$COS_SECRET_ID" \
            -s "$COS_SECRET_KEY" \
            -b yue-1252705137 \
            -r ap-nanjing
          # 清空旧文件，上传新文件
          coscmd delete -rf med/ 2>/dev/null || true
          coscmd upload -rs frontend/dist/ med/
          echo "COS upload done!"
